<!DOCTYPE html>
<html>
<head>
<title>Seminar Table</title>
<style>
    body {
        font-family: "Times New Roman", Times, serif; /* exact font style */
        background: white;
    }

    table {
        margin: 30px auto;
        border: 3px solid #8c8c8c;
        border-spacing: 6px; /* spacing for grey shade gaps */
        background: #d9d9d9; /* outer shade */
    }

    th, td {
        border: 2px solid #a6a6a6;
        padding: 8px 14px;
        font-size: 18px;
        background: white; /* remove all default colors */
    }

    th {
        font-weight: bold;
        text-align: center;
    }

    .day {
        text-align: left;
        width: 120px;
    }

    .topic {
        text-align: left;
        width: 300px;
    }

    /* ONLY time cells colored */
    .yellow { background: #f4f1c6; }
    .green  { background: #cfe9cf; }
    .purple { background: #d6d6f5; }

</style>
</head>
<body>

<table>
    <tr>
        <th rowspan="3">Day</th>
        <th colspan="3">Seminar</th>
    </tr>
    <tr>
        <th colspan="2">Schedule</th>
        <th rowspan="2">Topic</th>
    </tr>
    <tr>
        <th>Begin</th>
        <th>End</th>
    </tr>

    <!-- Monday -->
    <tr>
        <td rowspan="2" class="day">Monday</td>
        <td rowspan="2" class="yellow">8:00 a.m.</td>
        <td rowspan="2" class="purple">5:00 p.m.</td>
        <td class="topic">Introduction to XML</td>
    </tr>
    <tr>
        <td class="topic">Validity: DTD and Relax NG</td>
    </tr>

    <!-- Tuesday -->
    <tr>
        <td rowspan="3" class="day">Tuesday</td>
        <td class="yellow">8:00 a.m.</td>
        <td class="yellow">11:00 a.m.</td>
        <td class="topic">XPath</td>
    </tr>
    <tr>
        <td class="yellow">11:00 a.m.</td>
        <td class="green">2:00 p.m.</td>
        <td rowspan="2" class="topic">XSL Transformations</td>
    </tr>
    <tr>
        <td class="green">2:00 p.m.</td>
        <td class="purple">5:00 p.m.</td>
    </tr>

    <!-- Wednesday -->
    <tr>
        <td class="day">Wednesday</td>
        <td class="yellow">8:00 a.m.</td>
        <td class="green">12:00 p.m.</td>
        <td class="topic">XSL Formatting Objects</td>
    </tr>

</table>

</body>
</html>
