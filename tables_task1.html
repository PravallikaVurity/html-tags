<!DOCTYPE html>
<html>
<head>
    <title>Weather Station</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            text-align: center;
        }

        table {
            margin: auto;
            border: 4px solid gray;
            border-spacing: 10px; 
        }

        th, td {
            border: 3px solid gray;
            padding: 20px 30px;
            font-size: 26px;
            background-color: #f9f9f9;
        }

        th {
            font-weight: bold;
        }

        h1 {
            font-size: 40px;
        }
    </style>
</head>
<body>

<h1>Weather Station</h1>

<table>
    <tr>
        <th rowspan="2">Station</th>
        <th colspan="2">Temperature</th>
        <th rowspan="2">Humidity</th>
        <th rowspan="2">Weather</th>
    </tr>
    <tr>
        <th>Max</th>
        <th>Min</th>
    </tr>
    <tr>
        <td>USA</td>
        <td>24</td>
        <td>19</td>
        <td>60%</td>
        <td>cloudy</td>
    </tr>
    <tr>
        <td>Germany</td>
        <td>5</td>
        <td>-1</td>
        <td>70%</td>
        <td>Rainy</td>
    </tr>
</table>

</body>
</html>
