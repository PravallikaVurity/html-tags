<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Survey Form</title>
    <style>
        body {
            font-family: Roboto, Arial, sans-serif;
            background-color: #f0ebf8;
            margin: 0;
        }
        .form-container {
            width: 500px;
            margin: 40px auto;
        }
        .form-header {
            background-color: #673ab7;
            color: white;
            padding: 20px;
            border-radius: 8px 8px 0 0;
        }
        .form-body {
            background: white;
            padding: 20px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: none;
            border-bottom: 2px solid #ccc;
            outline: none;
        }
        input:focus, textarea:focus, select:focus {
            border-bottom: 2px solid #673ab7;
        }
        .options input {
            width: auto;
            margin-right: 5px;
        }
        .submit-btn {
            background-color: #673ab7;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #5a32a3;
        }
    </style>
</head>
<body>

<div class="form-container">
    
    <div class="form-header">
        <h2>Survey Form</h2>
        <p>Please fill out this survey</p>
    </div>

    <div class="form-body">
        <form action="#" method="post">

            <!-- Name -->
            <div class="form-group">
                <label>User Name *</label>
                <input type="text" name="username" placeholder="Your answer" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" placeholder="Your email" required>
            </div>

            <!-- Feedback -->
            <div class="form-group">
                <label>Feedback *</label>
                <textarea name="feedback" rows="4" placeholder="Your answer" required></textarea>
            </div>

            <!-- Rating -->
            <div class="form-group">
                <label>Rating *</label>
                <div class="options">
                    <input type="radio" name="rating" value="1" required>1<br>
                    <input type="radio" name="rating" value="2">2<br>
                    <input type="radio" name="rating" value="3">3<br>
                    <input type="radio" name="rating" value="4">4<br>
                    <input type="radio" name="rating" value="5">5
                </div>
            </div>

            <!-- Technology -->
            <div class="form-group">
                <label>Favorite Technology *</label>
                <select name="technology" required>
                    <option value="">Choose</option>
                    <option>HTML</option>
                    <option>CSS</option>
                    <option>JavaScript</option>
                    <option>Python</option>
                    <option>Java</option>
                </select>
            </div>

            <!-- Subscribe -->
            <div class="form-group">
                <input type="checkbox" name="subscribe">
                <label>Subscribe to newsletter</label>
            </div>

            <!-- Submit -->
            <button type="submit" class="submit-btn">Submit</button>

        </form>
    </div>

</div>

</body>
</html>
