<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .inline {
            width: auto;
            margin-right: 10px;
        }

        .submit-btn {
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #555;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>User Registration</h2>

    <form>

        <!-- Full Name -->
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="full_name" 
               placeholder="Enter your full name" required>

        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" id="email" name="email" 
               placeholder="Enter your email" required>

        <!-- Password -->
        <label for="password">Password</label>
        <input type="password" id="password" name="password" 
               placeholder="Enter password" required minlength="6">

        <!-- Confirm Password -->
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" 
               placeholder="Re-enter password" required minlength="6">

        <!-- Gender -->
        <label>Gender</label><br>
        <input type="radio" name="gender" value="male" class="inline" required> Male
        <input type="radio" name="gender" value="female" class="inline"> Female
        <input type="radio" name="gender" value="other" class="inline"> Other
        <br><br>

        <!-- Hobbies -->
        <label>Hobbies</label><br>
        <input type="checkbox" name="hobbies[]" value="reading" class="inline"> Reading
        <input type="checkbox" name="hobbies[]" value="sports" class="inline"> Sports
        <input type="checkbox" name="hobbies[]" value="music" class="inline"> Music
        <br><br>

        <!-- Date of Birth -->
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="date_of_birth" required>

        <!-- Submit -->
        <input type="submit" value="Register" class="submit-btn">

    </form>
</div>

</body>
</html>
