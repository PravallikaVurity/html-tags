<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="">
        <fieldset>
            <h1>Login Form</h1>
            <label for="">Username :</label>
            <input type="text" id="username" placeholder="username"><br><br>
            <label for="">Password</label>
            <input type="password" id="password" placeholder="password"><br><br>
            <button type="submit">Submit</button>
            <button type="reset">Cancel</button>
        </fieldset>
    </form>
    <script>
        let uName = document.getElementById("username");
        let psw = document.getElementById("password");
        let form = document.querySelector("form");

        form.addEventListener("submit",(o)=>{
            o.preventDefault()
            console.log("Username:",uName.value);
            console.log("Password:",psw.value);
            //localstorage.setItem() is used to store data in local storage in key value format
            //this local storage is  permanent storage because data not delete even browser close 
            window.localStorage.setItem("Username",uName.value)
            window.localStorage.setItem("Password",psw.value)

            let storedName=localStorage.getItem("Username")
            let storedpsw=localStorage.getItem("Password")
            console.log("stored username", storedName);
            console.log("stored password", storedpsw);
            
            

        })


    </script>
</body>

</html>
