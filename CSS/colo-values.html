<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*color values*/
        li:first-child{
            color:red;
            background-color: black;
        }
        li:nth-child(2){
            color: rgb(0,255,255);
            background-color: rgb(100,0,0);
        }
        li:nth-child(3){
            color: lightcoral;
            border: 10px solid rgba(100,0,255,0.3);
            background-color: rgba(100,0,150,0.5);
        }
        li:nth-child(4){
            background-color: hsl(90deg,50%,80%);
        }
        li:nth-child(5){
            background-color: hsla(90deg,50%,80%,0.5);
            color: hsla(60deg,70%,50%,0.4);
        }
        li:nth-child(6){
            background-color: #88ff01ca;
        }
        h1{
            color: transparent;
            background-color: yellow;
        }
        
    </style>
</head>
<body>
    <h1>color values</h1>
    <ol>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
        <li>
            <h4>headings</h4>
        </li>
    </ol>
</body>
</html>
